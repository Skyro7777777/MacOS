name: macOS Web Remote Control

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration to keep the runner accessible (minutes)'
        required: true
        default: '30'
      port:
        description: 'Port for web interface'
        required: false
        default: '8080'

jobs:
  web-remote-control:
    runs-on: macos-latest
    timeout-minutes: ${{ fromJson(github.event.inputs.duration || '30') }}
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyautogui Pillow mss

      - name: Setup Tailscale
        env:
          TAILSCALE_AUTH_KEY: ${{ secrets.TAILSCALE_AUTH_KEY }}
        run: |
          if [[ -n "$TAILSCALE_AUTH_KEY" ]]; then
            # Download and install Tailscale
            curl -fsSL https://pkgs.tailscale.com/stable/Tailscale.pkg -o /tmp/Tailscale.pkg
            sudo installer -pkg /tmp/Tailscale.pkg -target /
            
            # Connect to Tailscale
            sudo /Applications/Tailscale.app/Contents/MacOS/Tailscale up --authkey="$TAILSCALE_AUTH_KEY" --accept-routes --ssh
            
            # Get Tailscale IP
            echo "TAILSCALE_IP=$(sudo /Applications/Tailscale.app/Contents/MacOS/Tailscale ip -4 2>/dev/null || echo 'N/A')" >> $GITHUB_ENV
          else
            echo "TAILSCALE_AUTH_KEY not set, skipping Tailscale setup"
            echo "TAILSCALE_IP=Not available" >> $GITHUB_ENV
          fi

      - name: Start permission dialog monitor
        run: |
          # Start the permission monitor in background to auto-click "Allow" dialogs
          python3 ./permission_clicker.py --monitor 3600 &
          echo "Permission monitor started"

      - name: Start web remote control server
        run: |
          # Start the web remote control server
          python3 ./remote_streamer.py --port ${{ github.event.inputs.port || '8080' }} &
          echo "WEB_SERVER_PID=$!" >> $GITHUB_ENV
          
          # Wait for server to start
          sleep 3

      - name: Get system information
        id: system-info
        run: |
          echo "=== System Information ==="
          sw_vers
          echo ""
          echo "=== Hardware Information ==="
          system_profiler SPHardwareDataType
          echo ""
          echo "=== Network Information ==="
          ifconfig | grep "inet " | grep -v 127.0.0.1
          echo ""
          echo "=== Tailscale Status ==="
          sudo /Applications/Tailscale.app/Contents/MacOS/Tailscale status 2>/dev/null || echo "Tailscale not configured"
          
          # Get IPs
          LOCAL_IP=$(ipconfig getifaddr en0 2>/dev/null || echo "N/A")
          echo "LOCAL_IP=$LOCAL_IP" >> $GITHUB_OUTPUT
          echo "Local IP: $LOCAL_IP"
          
          TAILSCALE_IP=$(sudo /Applications/Tailscale.app/Contents/MacOS/Tailscale ip -4 2>/dev/null || echo "N/A")
          echo "TAILSCALE_IP=$TAILSCALE_IP" >> $GITHUB_OUTPUT
          echo "Tailscale IP: $TAILSCALE_IP"

      - name: Test screenshot functionality
        run: |
          # Test that we can take screenshots (bash has screen recording permission)
          python3 -c "
          import mss
          with mss.mss() as sct:
              screenshot = sct.grab(sct.monitors[0])
              print(f'Screenshot size: {screenshot.size}')
          "
          echo "Screenshot test passed!"

      - name: Upload initial screenshot
        uses: actions/upload-artifact@v4
        with:
          name: initial-screenshot
          path: /tmp/screenshot_*.jpg
          retention-days: 1
          if-no-files-found: ignore

      - name: Print connection information
        run: |
          PORT=${{ github.event.inputs.port || '8080' }}
          
          echo ""
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║           CONNECTION INFORMATION - WEB REMOTE                  ║"
          echo "╠════════════════════════════════════════════════════════════════╣"
          echo "║                                                                ║"
          echo "║  🌐 Web Interface (if Tailscale connected):                    ║"
          echo "║     http://${{ steps.system-info.outputs.TAILSCALE_IP }}:$PORT"
          echo "║                                                                ║"
          echo "║  🌐 Web Interface (local network):                             ║"
          echo "║     http://${{ steps.system-info.outputs.LOCAL_IP }}:$PORT"
          echo "║                                                                ║"
          echo "╠════════════════════════════════════════════════════════════════╣"
          echo "║  INSTRUCTIONS:                                                 ║"
          echo "║  1. Install Tailscale on your local machine                    ║"
          echo "║  2. Connect to the same Tailscale network                      ║"
          echo "║  3. Open the web interface URL in your browser                 ║"
          echo "║  4. Click on the screen to control the macOS runner            ║"
          echo "║                                                                ║"
          echo "║  FEATURES:                                                     ║"
          echo "║  • Live screenshot streaming                                   ║"
          echo "║  • Mouse click control                                         ║"
          echo "║  • Keyboard input                                              ║"
          echo "║  • Auto-allow permission dialogs                               ║"
          echo "║                                                                ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
          echo ""
          
          echo "CONNECTION_URL=http://${{ steps.system-info.outputs.TAILSCALE_IP }}:$PORT" >> $GITHUB_STEP_SUMMARY

      - name: Keep runner alive
        run: |
          DURATION=${{ github.event.inputs.duration || '30' }}
          DURATION_MINUTES=$DURATION
          
          echo "Keeping runner alive for $DURATION_MINUTES minutes..."
          
          for i in $(seq 1 $DURATION_MINUTES); do
            echo "=== Minute $i of $DURATION_MINUTES ==="
            echo "Web server still running: $(curl -s -o /dev/null -w '%{http_code}' http://localhost:${{ github.event.inputs.port || '8080' }}/status)"
            
            # Check if screenshot still works
            python3 -c "
            import mss
            with mss.mss() as sct:
                sct.grab(sct.monitors[0])
            " && echo "Screenshot: OK" || echo "Screenshot: FAILED"
            
            sleep 60
          done

      - name: Cleanup
        if: always()
        run: |
          # Stop servers
          kill $WEB_SERVER_PID 2>/dev/null || true
          pkill -f permission_clicker.py 2>/dev/null || true
          pkill -f remote_streamer.py 2>/dev/null || true
          
          # Disconnect Tailscale
          sudo /Applications/Tailscale.app/Contents/MacOS/Tailscale down 2>/dev/null || true
