# macOS Remote Control Workflow
# ==============================
# This workflow sets up remote access to macOS GitHub Actions runners
# using Tailscale for secure networking and Apple Screen Sharing for VNC.
#
# SETUP REQUIRED:
# Add secret to your GitHub repo:
#   - TAILSCALE_AUTH_KEY: Your Tailscale auth key from https://login.tailscale.com/admin/settings/keys

name: macOS Remote Control

on:
  workflow_dispatch:
    inputs:
      duration:
        description: 'Duration to keep runner alive (minutes)'
        required: true
        default: '30'
      vnc_password:
        description: 'VNC Password'
        required: false
        default: 'Apple@123'

jobs:
  setup-remote:
    runs-on: macos-latest
    timeout-minutes: ${{ fromJson(github.event.inputs.duration) + 10 }}

    steps:
      # ==========================================
      # STEP 1: Checkout repo to get Python scripts
      # ==========================================
      - name: Checkout repository
        uses: actions/checkout@v4

      # ==========================================
      # STEP 2: Setup Tailscale for secure access
      # ==========================================
      - name: Setup Tailscale
        uses: tailscale/github-action@v2
        with:
          authkey: ${{ secrets.TAILSCALE_AUTH_KEY }}

      # ==========================================
      # STEP 3: Run diagnostic to check permissions
      # ==========================================
      - name: Diagnose TCC permissions
        run: |
          echo "=========================================="
          echo "  TCC Permission Diagnostic"
          echo "=========================================="

          echo ""
          echo "[*] Checking Screen Recording permissions..."

          # Query system TCC database
          echo "System TCC.db Screen Recording apps:"
          sudo sqlite3 "/Library/Application Support/com.apple.TCC/TCC.db" \
            "SELECT client FROM access WHERE service='kTCCServiceScreenCapture';" 2>/dev/null || \
            echo "  (Cannot read system TCC.db)"

          # Query user TCC database
          echo ""
          echo "User TCC.db Screen Recording apps:"
          sqlite3 "$HOME/Library/Application Support/com.apple.TCC/TCC.db" \
            "SELECT client FROM access WHERE service='kTCCServiceScreenCapture';" 2>/dev/null || \
            echo "  (Cannot read user TCC.db)"

          # Test screen capture
          echo ""
          echo "[*] Testing screen capture (bash should have permission)..."
          screencapture -x /tmp/diag_screenshot.png
          if [ -f /tmp/diag_screenshot.png ]; then
            SIZE=$(stat -f%z /tmp/diag_screenshot.png 2>/dev/null || stat -c%s /tmp/diag_screenshot.png)
            echo "[+] Screenshot works! Size: $SIZE bytes"
          else
            echo "[-] Screenshot failed"
          fi

      # ==========================================
      # STEP 4: Enable VNC/Screen Sharing
      # ==========================================
      - name: Enable Screen Sharing (VNC)
        run: |
          echo "[*] Enabling Remote Management (Apple VNC)..."

          # Enable Remote Management with VNC
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -activate \
            -configure \
            -access -on \
            -restart -agent \
            -privs -all \
            -clientopts -setvnclegacy -vnclegacy yes \
            -clientopts -setvncpw -vncpw "${{ github.event.inputs.vnc_password }}" \
            2>&1 || echo "kickstart returned non-zero (may still work)"

          # Try enabling Screen Sharing service
          sudo launchctl load -w /System/Library/LaunchDaemons/com.apple.screensharing.plist 2>/dev/null || true

          echo ""
          echo "[*] Checking VNC status..."
          sudo lsof -i :5900 2>/dev/null || echo "Port 5900 check completed"

      # ==========================================
      # STEP 5: Create remote user
      # ==========================================
      - name: Create remote user
        run: |
          VNC_PASS="${{ github.event.inputs.vnc_password }}"

          if ! id -u remoteuser &>/dev/null; then
            echo "[*] Creating remoteuser with password..."
            sudo sysadminctl -addUser remoteuser -password "$VNC_PASS" -admin
            echo "[+] User created"
          else
            echo "[*] User exists, updating password..."
            sudo sysadminctl -resetPasswordFor remoteuser -newPassword "$VNC_PASS"
            echo "[+] Password updated"
          fi

      # ==========================================
      # STEP 6: Run Python diagnostic tool
      # ==========================================
      - name: Run Python diagnostic
        run: |
          echo ""
          echo "[*] Running Python diagnostic tool..."
          python3 macos_remote_control.py diagnose

      # ==========================================
      # STEP 7: Display connection info
      # ==========================================
      - name: Display connection info
        run: |
          TS_IP=$(tailscale ip -4 2>/dev/null || echo "NOT_CONNECTED")

          echo ""
          echo "=========================================="
          echo "  🔗 CONNECTION INFORMATION"
          echo "=========================================="
          echo ""
          echo "  Tailscale IP: $TS_IP"
          echo "  VNC Port: 5900"
          echo "  Username: remoteuser"
          echo "  Password: ${{ github.event.inputs.vnc_password }}"
          echo ""
          echo "=========================================="
          echo "  📋 HOW TO CONNECT"
          echo "=========================================="
          echo ""
          echo "  1. Install Tailscale on your machine"
          echo "     https://tailscale.com/download"
          echo ""
          echo "  2. Connect to same Tailscale network"
          echo "     (Use same auth key or be on same tailnet)"
          echo ""
          echo "  3. Use VNC client to connect:"
          echo "     Address: $TS_IP:5900"
          echo "     Username: remoteuser"
          echo "     Password: ${{ github.event.inputs.vnc_password }}"
          echo ""
          echo "  4. Or use macOS Screen Sharing:"
          echo "     open vnc://$TS_IP:5900"
          echo ""
          echo "=========================================="
          echo ""

          # Save for artifact
          mkdir -p /tmp/connection_info
          cat > /tmp/connection_info/connect.txt << EOF
          Tailscale IP: $TS_IP
          VNC Port: 5900
          Username: remoteuser
          Password: ${{ github.event.inputs.vnc_password }}

          Connect via VNC client to: $TS_IP:5900
          Or run: open vnc://$TS_IP:5900
          EOF

      # ==========================================
      # STEP 8: Keep session alive
      # ==========================================
      - name: Keep session alive
        run: |
          DURATION=${{ github.event.inputs.duration }}
          echo "[*] Keeping session alive for $DURATION minutes..."
          echo "[*] Connect now via VNC!"
          echo ""

          SECONDS=$((DURATION * 60))
          INTERVAL=30
          ELAPSED=0

          while [ $ELAPSED -lt $SECONDS ]; do
            # Keep display active
            screencapture -x "/tmp/keepalive_${ELAPSED}.png" 2>/dev/null || true

            # Prevent sleep
            caffeinate -i -t 35 2>/dev/null &

            REMAINING=$(( (SECONDS - ELAPSED) / 60 ))
            echo "[*] Time remaining: ${REMAINING} minutes | Tailscale IP: $(tailscale ip -4 2>/dev/null || echo '?')"

            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))
          done

          echo "[*] Session ended"

      # ==========================================
      # STEP 9: Upload connection info artifact
      # ==========================================
      - name: Upload connection info
        uses: actions/upload-artifact@v4
        with:
          name: connection-info
          path: /tmp/connection_info/
          retention-days: 1

      # ==========================================
      # STEP 10: Cleanup (runs always)
      # ==========================================
      - name: Cleanup
        if: always()
        run: |
          echo "[*] Cleaning up..."

          # Remove user
          sudo sysadminctl -deleteUser remoteuser 2>/dev/null || true

          # Disable VNC
          sudo /System/Library/CoreServices/RemoteManagement/ARDAgent.app/Contents/Resources/kickstart \
            -deactivate -stop 2>/dev/null || true

          # Disconnect Tailscale
          sudo tailscale down 2>/dev/null || true

          echo "[+] Cleanup complete"
